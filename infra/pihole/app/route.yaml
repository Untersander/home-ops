apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pihole
  namespace: pihole
spec:
  hostnames:
  - pihole.k8s.garden
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: traefik-gateway
    namespace: traefik
    sectionName: websecure
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: pihole
      port: 80
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /