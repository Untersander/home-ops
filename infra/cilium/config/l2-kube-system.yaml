apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: cilium-lb-l2-policy
  namespace: kube-system
spec:
  serviceSelector:
    matchExpressions:
      - key: io.kubernetes.service.namespace
        operator: In
        values:
          - kube-system
  interfaces:
    - ^br.*
    - ^eno.*
    - ^enp.*s0
    - ^enp2s0f1np1
  loadBalancerIPs: true
