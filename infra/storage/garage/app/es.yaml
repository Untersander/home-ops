apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage
  namespace: storage
spec:
  refreshInterval: 6h0m0s
  secretStoreRef:
    name: 1password-sdk
    kind: ClusterSecretStore
  target:
    name: garage-secret
    creationPolicy: Owner
    template:
      templateFrom:
        - configMap:
            name: garage-configmap
            items:
              - key: garage.toml
  dataFrom:
  - extract:
      key: "Garage"