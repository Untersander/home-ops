---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      garage:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/dxflrs/garage
              tag: v2.3.0@sha256:866bd13ed2038ba7e7190e840482bc27234c4afaf77be8cfa439ae088c1e4690
            env:
              TZ: "Europe/Zurich"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 5m
                memory: 100Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      hostUsers: false
      # securityContext:
      #   seccompProfile:
      #     type: RuntimeDefault
      #   runAsNonRoot: true
      #   runAsUser: 1000
      #   runAsGroup: 1000
      #   fsGroup: 1000
      #   fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          s3:
            port: 3900
          api:
            port: 3903
    route:
      app:
        hostnames:
          - "s3.k8s.garden"
        parentRefs:
          - name: traefik-gateway
            namespace: traefik
        rules:
          - backendRefs:
              - identifier: app
                port: s3
    persistence:
      config:
        type: secret
        name: garage-secret
        globalMounts:
          - path: /etc/garage.toml
            subPath: garage.toml
            readOnly: true
      data:
        existingClaim: garage-data
        advancedMounts:
          garage:
            app:
              - path: /data
                subPath: data
              - path: /meta
                subPath: meta