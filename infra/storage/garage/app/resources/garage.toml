metadata_dir = "/meta"
data_dir = "/data"
db_engine = "sqlite"
metadata_auto_snapshot_interval = "6h"

replication_factor = 1
compression_level = 2

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"
rpc_secret = "{{ .rpc }}"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = ".s3.k8s.garden"

[admin]
api_bind_addr = "[::]:3903"
admin_token = "{{ .password }}"
metrics_token = "{{ .metrics }}"