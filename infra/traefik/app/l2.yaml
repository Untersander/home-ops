apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: traefik-lb-l2-policy
  namespace: traefik
spec:
  interfaces:
  - ^br.*
  - ^eno.*
  - ^enp.*s0
  - ^enp2s0f1np1
  loadBalancerIPs: true
  serviceSelector:
    matchExpressions:
    - key: io.kubernetes.service.namespace
      operator: In
      values:
      - traefik