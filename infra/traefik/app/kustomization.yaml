# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./cert-noreplay.yaml
  - ./cert-k8s.yaml
  - ./l2.yaml
# Having Traefik values in a separate `values.yaml` is more comfortable.
configMapGenerator:
  - name: traefik-values
    namespace: traefik
    files:
      - values.yaml=./values.yaml
configurations:
  - nameReference.yaml
