# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  chart:
    spec:
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      chart: traefik
      version: 39.0.1
  driftDetection:
    mode: enabled
  interval: 3m
  valuesFrom:
    - kind: ConfigMap
      name: traefik-values # Default name, changed using Kustomization
