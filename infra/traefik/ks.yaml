# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik-configs
  namespace: traefik
spec:
  dependsOn:
    - name: repos
      namespace: flux-system
    - name: crds
      namespace: flux-system
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infra/traefik/configs
  targetNamespace: traefik
  prune: true
  interval: 3m
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik
  namespace: traefik
spec:
  dependsOn:
    - name: repos
      namespace: flux-system
    - name: crds
      namespace: flux-system
    - name: traefik-configs
      namespace: traefik
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infra/traefik/app
  targetNamespace: traefik
  prune: true
  interval: 3m