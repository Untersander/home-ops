apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wg-manager
  namespace: wg
spec:
  hostnames:
    - wg-manager.k8s.garden
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: wg-manager
          port: 8080
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
