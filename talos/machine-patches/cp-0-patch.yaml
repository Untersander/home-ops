machine:
  certSANs:
    - cp-0.k8s.garden
    - cp-0.local
    - cp-0
  features:
    hostDNS:
      enabled: true
    kubernetesTalosAPIAccess:
      allowedKubernetesNamespaces:
        - system-upgrade # tuppr
      allowedRoles:
        - os:admin
      enabled: true
  install:
    wipe: true
    diskSelector:
      size: "<= 300GB" # Disk size.
      model: Samsung SSD* # Disk model `/sys/block/<dev>/device/model`.
  kubelet:
    nodeIP:
      # The `validSubnets` field configures the networks to pick kubelet node IP from.
      validSubnets:
        - 10.0.0.0/24
        - fd00::/64
cluster:
  controlPlane:
    # Endpoint is the canonical controlplane endpoint, which can be an IP address or a DNS hostname.
    endpoint: https://10.0.0.1:6443
  etcd:
    # listenSubnets defaults to advertisedSubnets if not set explicitly
    advertisedSubnets:
      - 10.0.0.0/24
      - fd00::/64
---
apiVersion: v1alpha1
kind: HostnameConfig
auto: off
hostname: cp-0
---
apiVersion: v1alpha1
kind: LinkConfig
name: enp2s0f0np0
up: true
---
apiVersion: v1alpha1
kind: DHCPv4Config
name: enp2s0f0np0
ignoreHostname: true
---
apiVersion: v1alpha1
kind: BridgeConfig
name: br0
links:
  - eno1
  - enp7s0
  - enp8s0
  - enp9s0
  - enp10s0
  - enp2s0f1np1
stp:
  enabled: false
vlan:
  filtering: false
up: true
addresses:
  - address: 10.0.0.1/24
  - address: fd00::1/64
routes:
  - destination: 10.0.0.0/24
